<!DOCTYPE html>
<html>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <style>
        html, body, body > div, #container, #container-uiarea { height: 100%; }
    </style>
    <script id="sap-ui-bootstrap"
        src="https://ui5.sap.com/1.120.0/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-resourceroots='{"products.demo": "./"}'

        data-sap-ui-oninit="module:sap/ui/core/ComponentSupport">

<body class="sapUiBody" id="content">
    <div data-sap-ui-component
         data-name="products.demo"
         data-id="container"
         data-settings='{"id": "products.demo"}'
         data-handle-validation="true"
